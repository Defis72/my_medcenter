{% extends 'clinic/base.html' %}
{% block content %}
<h2><i class="bi bi-book"></i> Словарь терминов / FAQ</h2>
<form method="get" class="mb-3 d-flex gap-2">
    <input type="text" name="q" class="form-control" placeholder="Поиск..." value="{{ query }}">
    <button type="submit" class="btn btn-primary"><i class="bi bi-search"></i></button>
    {% if query %}<a href="{% url 'glossary' %}" class="btn btn-outline-secondary">✕</a>{% endif %}
</form>
<div class="accordion" id="glossaryAccordion">
{% for term in terms %}
<div class="accordion-item">
    <h2 class="accordion-header">
        <button class="accordion-button {% if not forloop.first %}collapsed{% endif %}" type="button" data-bs-toggle="collapse" data-bs-target="#term{{ term.pk }}">
            {{ term.question }}
        </button>
    </h2>
    <div id="term{{ term.pk }}" class="accordion-collapse collapse {% if forloop.first %}show{% endif %}">
        <div class="accordion-body">
            {{ term.answer }}
            <p class="text-muted small mt-2 mb-0"><i class="bi bi-clock"></i> Добавлено: {{ term.added_at|date:"d/m/Y" }}</p>
        </div>
    </div>
</div>
{% empty %}
<div class="alert alert-info">Термины не найдены.</div>
{% endfor %}
</div>
{% endblock %}
