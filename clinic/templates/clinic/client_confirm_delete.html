{% extends 'clinic/base.html' %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
<div class="card border-danger">
<div class="card-header text-danger"><h5><i class="bi bi-exclamation-triangle"></i> Удаление клиента</h5></div>
<div class="card-body">
<p>Вы уверены, что хотите удалить клиента <strong>{{ client.get_full_name }}</strong>?</p>
<p class="text-danger">Это действие нельзя отменить.</p>
<form method="post" class="d-flex gap-2">
{% csrf_token %}
<button type="submit" class="btn btn-danger">Да, удалить</button>
<a href="{% url 'manage_clients' %}" class="btn btn-outline-secondary">Отмена</a>
</form>
</div>
</div>
</div>
</div>
{% endblock %}
