version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: medcenter_db
      POSTGRES_USER: medcenter_user
      POSTGRES_PASSWORD: medcenter_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medcenter_user -d medcenter_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=docker-secret-key-change-in-production-please
      - DATABASE_URL=postgresql://medcenter_user:medcenter_pass@db:5432/medcenter_db
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - LOG_LEVEL=INFO
      - OPENWEATHER_API_KEY=
      - EXCHANGE_API_KEY=
    volumes:
      - media_data:/app/media
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
  logs_data:
